<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body class="bg-gray-200 min-h-screen flex items-center justify-center">

<div class="w-[420px] bg-white rounded-xl shadow-xl p-8">

    
    <div class="flex justify-center mb-4">
        <div class="bg-gray-900 text-white w-14 h-14 flex items-center justify-center rounded-full text-2xl">
            <i class="fa-brands fa-github"></i>
        </div>
    </div>

    
    <h2 class="text-center text-xl font-bold text-gray-700">
        GitHub Issues Tracker
    </h2>
    <p class="text-center text-gray-500 text-sm mb-6">
        Sign in to manage your issues
    </p>

   
    <label class="text-sm font-medium text-gray-700">Username</label>
    <input id="input-Username" type="text"
    placeholder="Enter Username"
    class="w-full border rounded-lg px-3 py-2 mt-1 mb-1 focus:outline-none focus:ring-2 focus:ring-purple-500">

    <p class="text-xs text-blue-600 mb-3">Default: admin</p>

   
    <label class="text-sm font-medium text-gray-700">Password</label>
    <input id="input-pin" type="password"
    placeholder="Enter Password"
    class="w-full border rounded-lg px-3 py-2 mt-1 mb-1 focus:outline-none focus:ring-2 focus:ring-purple-500">

    <p class="text-xs text-blue-600 mb-4">Default: admin123</p>

    
    <button id="login-btn" class="w-full py-2 rounded-lg text-white font-medium
    bg-gradient-to-r from-purple-600 to-indigo-600 hover:opacity-90">
        Sign In
    </button>

   
    <div class="flex items-center my-5">
        <hr class="flex-grow border-gray-300">
        <span class="mx-3 text-gray-400 text-sm">OR</span>
        <hr class="flex-grow border-gray-300">
    </div>

    <p class="text-center text-gray-400 text-sm mb-3">Demo Credentials:</p>

    <div class="bg-gray-100 rounded-lg p-4 text-center text-sm">
        <p><span class="font-semibold">Username:</span> admin</p>
        <p><span class="font-semibold">Password:</span> admin123</p>
    </div>

</div>
    <script src="script/sign in.js"></script>
</body>
</html>
